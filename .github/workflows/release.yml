name: Release

on:
  release:
    types: [published, prereleased]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: range-porter

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build, package, and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ env.BIN_NAME }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          zip: none
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: aggregate SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download per-target checksums from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.tar.gz.sha256' \
            --dir dist

      - name: Aggregate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.tar.gz.sha256 > ../SHA256SUMS
          cd ..
          echo '--- SHA256SUMS ---'
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
